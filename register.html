<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiroo - Registro de Cuenta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/register.css">
</head>
<body>

<div class="register-wrapper">
    <a href="login.html" class="back-home">
        <i class="fa-solid fa-arrow-left"></i> Volver al login
    </a>

    <div class="register-header">
        <div class="logo">KI<span>R</span>OO</div>
        <h5>Únete a nuestra comunidad</h5>
    </div>

    <!-- Selector de tipo de cuenta estilo pestañas -->
    <div class="account-tabs">
        <button class="account-tab active" data-type="cliente">
            <i class="fa-solid fa-user"></i> Cliente
        </button>
        <button class="account-tab" data-type="mecanico">
            <i class="fa-solid fa-wrench"></i> Mecánico
        </button>
    </div>

    <div class="register-card" id="registerCard">
        <div class="text-center mb-3">
            <i class="fa-solid fa-user-plus fa-2x" id="formIcon" style="color: var(--kiroo-red);"></i>
            <h4 class="mt-2" id="formTitle">Registro de Cliente</h4>
        </div>

        <div class="error-message" id="errorMessage">
            <i class="fa-solid fa-circle-exclamation me-2"></i>
            <span id="errorText"></span>
        </div>

        <form id="registerForm">
            <!-- Campos comunes para ambos tipos -->
            <div class="mb-3">
                <label class="form-label">Nombre de usuario *</label>
                <input type="text" class="form-control" id="username" placeholder="Ej: juan_perez" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Correo electrónico *</label>
                <input type="email" class="form-control" id="email" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Nombre completo *</label>
                <input type="text" class="form-control" id="fullName" placeholder="Tu nombre completo" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Teléfono *</label>
                <input type="tel" class="form-control" id="phone" placeholder="+503 1234 5678" required>
            </div>

            <!-- Campos específicos de CLIENTE -->
            <div id="clientFields">
                <div class="mb-3">
                    <label class="form-label">Vehículo principal (marca/modelo/placa)</label>
                    <input type="text" class="form-control" id="vehicleInfo" placeholder="Ej: Toyota Corolla P-1234">
                    <small class="text-muted">Opcional, puedes agregar más después</small>
                </div>
            </div>

            <!-- Campos específicos de MECÁNICO -->
            <div id="mechanicFields" style="display: none;">
                <div class="mb-3">
                    <label class="form-label">Especialidad *</label>
                    <select class="form-select" id="specialty">
                        <option value="" disabled selected>Selecciona tu especialidad</option>
                        <option value="general">🔧 Mecánica General</option>
                        <option value="frenos">🛑 Sistema de Frenos</option>
                        <option value="electrico">⚡ Sistema Eléctrico</option>
                        <option value="motor">⚙️ Motor y Transmisión</option>
                        <option value="suspension">🔩 Suspensión y Dirección</option>
                        <option value="carroceria">🚗 Carrocería y Pintura</option>
                        <option value="otro">📌 Otra especialidad</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nombre del taller (opcional)</label>
                    <input type="text" class="form-control" id="workshopName" placeholder="Nombre de tu taller">
                </div>

                <div class="mb-3">
                    <label class="form-label">Años de experiencia</label>
                    <input type="number" class="form-control" id="experience" placeholder="Ej: 5" min="0" max="50">
                </div>
            </div>

            <!-- Campos de contraseña (comunes) -->
            <div class="mb-3">
                <label class="form-label">Contraseña *</label>
                <input type="password" class="form-control" id="password" placeholder="Mínimo 6 caracteres" minlength="6" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirmar contraseña *</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="Repite tu contraseña" required>
            </div>

            <div class="info-box" id="infoBox">
                <i class="fa-solid fa-circle-info me-2"></i>
                <span id="infoText">Podrás agregar más vehículos y gestionar tu historial desde tu panel de cliente</span>
            </div>

            <button type="submit" class="btn-register" id="submitBtn">
                <i class="fa-solid fa-user-plus me-2"></i> Crear cuenta
            </button>
        </form>

        <div class="login-link">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
        </div>
    </div>
</div>
<script src="js/register.js"></script>
</body>
</html>
