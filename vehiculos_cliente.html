<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiroo - Registro de Vehículos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/vehiculos.css">
</head>
<body>

    <nav class="navbar-kiroo">
        <div class="navbar-content">
            <a href="index.html" class="brand">KIROO</a>
            <div class="nav-links">
                <a href="index_cliente.html" class="nav-link"><i class="fas fa-home"></i> Inicio</a>
                <a href="agenda_cliente.html" class="nav-link"><i class="fas fa-calendar"></i> Agenda</a>
                <a href="vehiculos_cliente.html" class="nav-link active"><i class="fas fa-car"></i> Vehículos</a>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="page-header">
            <h1><i class="fas fa-car"></i> Mis Vehículos</h1>
            <a href="index_cliente.html" class="btn-back">
                <i class="fas fa-arrow-left"></i> Volver al inicio
            </a>
        </div>

        <div id="alertContainer"></div>

        <div class="content-grid">
            <!-- Formulario -->
            <div class="card">
                <div class="card-header">
                    <h2 id="formTitle"><i class="fas fa-plus-circle"></i> Nuevo Vehículo</h2>
                </div>
                <form id="vehicleForm">
                    <input type="hidden" id="vehicleId">
                    
                    <div class="form-group">
                        <label class="form-label">Marca *</label>
                        <input type="text" id="brand" class="input-field" placeholder="Ej: Toyota" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Modelo *</label>
                        <input type="text" id="model" class="input-field" placeholder="Ej: Corolla" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Número de Placa *</label>
                        <input type="text" id="plateNumber" class="input-field" placeholder="Ej: ABC-123" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Año</label>
                        <input type="number" id="year" class="input-field" placeholder="Ej: 2024" min="1900" max="2030">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Kilometraje</label>
                        <input type="number" id="mileage" class="input-field" placeholder="Kilómetros actuales" value="0">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Color</label>
                        <input type="text" id="color" class="input-field" placeholder="Ej: Rojo">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Notas</label>
                        <textarea id="notes" class="input-field" placeholder="Notas adicionales sobre el vehículo..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <i class="fas fa-save"></i> Guardar Vehículo
                    </button>
                </form>
            </div>

            <!-- Lista de vehículos -->
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-list"></i> Vehículos Registrados</h2>
                    <button class="btn btn-secondary" id="newVehicleBtn">
                        <i class="fas fa-plus"></i> Nuevo
                    </button>
                </div>
                <div class="vehicles-list" id="vehiclesList">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Cargando vehículos...
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/vehiculos.js"></script>
</body>
</html>
