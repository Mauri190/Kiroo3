<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiroo - Perfil del Usuario</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/perfil.css">
</head>
<body>

    <div class="main-container">
        <div class="left-panel">
            <div class="brand-name">KIROO</div>
            <h1 class="main-title">PERFIL DEL<br>USUARIO</h1>
        </div>

        <div class="right-panel">
            <div class="profile-card">
                
                <i class="fa-solid fa-chevron-left back-arrow"></i>

                <div class="top-logo">
                    <h2 class="logo-text">KIROO</h2>
                    <div class="logo-sub">Your copilot, your safety</div>
                </div>

                <div class="profile-content">
                    <div class="avatar-circle">
                        <i class="fa-solid fa-user"></i>
                    </div>

                    <div class="info-buttons">
                        <button class="btn-info">NOMBRE COMPLETO</button>
                        <button class="btn-info">TIPO DE CUENTA</button>
                        <button class="btn-info">AGREGAR OTRA CUENTA</button>
                    </div>
                </div>

                <button class="btn-edit">EDITAR CUENTA</button>

            </div>
        </div>
    </div>

</body>
</html>
