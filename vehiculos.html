<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiroo - Registro de Vehículos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-black: #000000;
            --card-dark: #3a3632;
            --card-light: #c5beb6;
            --input-gray: #c5beb6;
            --accent-red: #ff1a1a;
            --text-white: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 40px;
        }

        .top-nav {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .brand {
            position: absolute;
            top: 20px;
            left: 40px;
            letter-spacing: 3px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn-back {
            color: var(--accent-red);
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            gap: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-back:hover { opacity: 0.8; }

        .btn-index {
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            font-size: 0.95rem;
            gap: 6px;
            background: rgba(255,255,255,0.1);
            padding: 6px 14px;
            border-radius: 20px;
            transition: background 0.2s;
        }

        .btn-index:hover { background: rgba(255,255,255,0.2); }

        h1 {
            font-size: 2rem;
            font-weight: 500;
            margin: 0;
        }

        .main-content {
            display: flex;
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .form-container {
            flex: 1.5;
            background-color: var(--card-dark);
            border-radius: 25px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 280px;
        }

        .input-field {
            background-color: var(--input-gray);
            border: none;
            border-radius: 20px;
            padding: 15px 25px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #333;
            text-align: center;
            width: 100%;
        }

        .input-field::placeholder { color: #555; }

        .input-field:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--accent-red);
        }

        select.input-field {
            appearance: none;
            cursor: pointer;
        }

        textarea.input-field {
            resize: vertical;
            font-family: inherit;
        }

        .btn-save {
            align-self: flex-end;
            background-color: var(--input-gray);
            border: none;
            padding: 12px 40px;
            border-radius: 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .btn-save:hover { background-color: #ddd; }

        .list-container {
            flex: 1;
            background-color: var(--card-light);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: fit-content;
            min-height: 400px;
            min-width: 250px;
        }

        .list-header {
            background-color: #4a4540;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .list-header span { font-size: 1.2rem; }

        .btn-add {
            background-color: var(--accent-red);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-add:hover { opacity: 0.85; }

        .list-body {
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }

        .vehicle-item {
            background-color: #3a3632;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
            cursor: pointer;
        }

        .vehicle-item:hover { background-color: #4a4540; }

        .vehicle-info h6 {
            margin: 0 0 5px 0;
            font-size: 1rem;
            color: #fff;
        }

        .vehicle-info small {
            font-size: 0.75rem;
            color: #ccc;
        }

        .vehicle-actions { display: flex; gap: 8px; }

        .vehicle-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 5px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .vehicle-actions .btn-edit { color: #ffaa00; }
        .vehicle-actions .btn-edit:hover { background-color: rgba(255,170,0,0.2); }
        .vehicle-actions .btn-delete { color: var(--accent-red); }
        .vehicle-actions .btn-delete:hover { background-color: rgba(255,26,26,0.2); }

        .empty-message {
            text-align: center;
            color: #666;
            padding: 30px;
            font-style: italic;
        }

        .form-section-title {
            color: #ccc;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
            margin-bottom: -5px;
        }

        @media (max-width: 800px) {
            body { padding: 20px; }
            .brand { position: static; margin-bottom: 10px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="brand">KIROO</div>

    <div class="top-nav">
        <div class="nav-links">
            <a href="javascript:void(0)" class="btn-back" onclick="window.location.href='index.html'">
                <i class="fa-solid fa-arrow-left"></i> Volver
            </a>
            <a href="index.html" class="btn-index">
                <i class="fa-solid fa-house"></i> Inicio
            </a>
        </div>
        <h1>Registro de vehículos</h1>
    </div>

    <div class="main-content">
        <div class="form-container">
            <input type="text" id="vehicleBrand" class="input-field" placeholder="MARCA DEL VEHÍCULO" required>
            <input type="text" id="vehicleModel" class="input-field" placeholder="MODELO DEL VEHÍCULO" required>
            <input type="text" id="plateNumber" class="input-field" placeholder="NÚMERO DE PLACA" required>
            <input type="number" id="vehicleYear" class="input-field" placeholder="AÑO" min="1900" max="2030" required>
            <input type="number" id="currentMileage" class="input-field" placeholder="KILOMETRAJE ACTUAL" required>
            <input type="text" id="vehicleColor" class="input-field" placeholder="COLOR (OPCIONAL)">
            <textarea id="additionalNotes" class="input-field" placeholder="NOTAS ADICIONALES (OPCIONAL)" rows="2"></textarea>
            
            <button id="saveBtn" class="btn-save">GUARDAR</button>
        </div>

        <div class="list-container">
            <div class="list-header">
                <span>Tus vehículos</span>
                <button id="clearFormBtn" class="btn-add">+ Agregar</button>
            </div>
            <div id="listBody" class="list-body">
                <div class="empty-message">No tienes vehículos registrados</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let vehicles = [];
            let editingVehicleId = null;

            const listBody = document.getElementById('listBody');
            const saveBtn = document.getElementById('saveBtn');
            const clearFormBtn = document.getElementById('clearFormBtn');
            const brandInput = document.getElementById('vehicleBrand');
            const modelInput = document.getElementById('vehicleModel');
            const plateInput = document.getElementById('plateNumber');
            const yearInput = document.getElementById('vehicleYear');
            const mileageInput = document.getElementById('currentMileage');
            const colorInput = document.getElementById('vehicleColor');
            const notesInput = document.getElementById('additionalNotes');

            // Clave unificada con agenda.html
            const VEHICLES_KEY = 'vehicles';

            function loadVehicles() {
                const saved = localStorage.getItem(VEHICLES_KEY);
                vehicles = saved ? JSON.parse(saved) : [];
                renderVehicleList();
            }

            function saveToStorage() {
                localStorage.setItem(VEHICLES_KEY, JSON.stringify(vehicles));
                // Disparar evento para que agenda.html se actualice si está en otra pestaña
                window.dispatchEvent(new StorageEvent('storage', { key: VEHICLES_KEY }));
            }

            function renderVehicleList() {
                listBody.innerHTML = '';
                if (vehicles.length === 0) {
                    listBody.innerHTML = '<div class="empty-message">No tienes vehículos registrados</div>';
                    return;
                }
                vehicles.forEach(vehicle => {
                    const item = document.createElement('div');
                    item.className = 'vehicle-item';
                    item.dataset.id = vehicle.id;
                    item.innerHTML = `
                        <div class="vehicle-info">
                            <h6>${vehicle.brand} ${vehicle.model}</h6>
                            <small>Placa: ${vehicle.plateNumber} | Año: ${vehicle.year} | Km: ${vehicle.mileage}</small>
                            ${vehicle.color ? `<br><small>Color: ${vehicle.color}</small>` : ''}
                        </div>
                        <div class="vehicle-actions">
                            <button class="btn-edit" onclick="editVehicle('${vehicle.id}')" title="Editar">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button class="btn-delete" onclick="deleteVehicle('${vehicle.id}')" title="Eliminar">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    `;
                    listBody.appendChild(item);
                });
            }

            function saveVehicle() {
                const brand = brandInput.value.trim();
                const model = modelInput.value.trim();
                const plateNumber = plateInput.value.trim();
                const year = yearInput.value.trim();
                const mileage = mileageInput.value.trim();
                const color = colorInput.value.trim();
                const notes = notesInput.value.trim();

                if (!brand) { alert('Ingresa la MARCA del vehículo'); brandInput.focus(); return; }
                if (!model) { alert('Ingresa el MODELO del vehículo'); modelInput.focus(); return; }
                if (!plateNumber) { alert('Ingresa el NÚMERO DE PLACA'); plateInput.focus(); return; }
                if (!year) { alert('Ingresa el AÑO del vehículo'); yearInput.focus(); return; }
                if (!mileage) { alert('Ingresa el KILOMETRAJE actual'); mileageInput.focus(); return; }

                const vehicle = {
                    id: editingVehicleId || Date.now().toString(),
                    brand, model, plateNumber, year, mileage, color, notes,
                    updatedAt: new Date().toISOString()
                };

                if (editingVehicleId) {
                    const idx = vehicles.findIndex(v => v.id === editingVehicleId);
                    if (idx !== -1) vehicles[idx] = vehicle;
                    alert('Vehículo actualizado correctamente');
                } else {
                    vehicle.createdAt = new Date().toISOString();
                    vehicles.push(vehicle);
                    alert('Vehículo guardado correctamente');
                }

                saveToStorage();
                clearForm();
                editingVehicleId = null;
                saveBtn.textContent = 'GUARDAR';
                renderVehicleList();
            }

            function clearForm() {
                brandInput.value = '';
                modelInput.value = '';
                plateInput.value = '';
                yearInput.value = '';
                mileageInput.value = '';
                colorInput.value = '';
                notesInput.value = '';
            }

            saveBtn.addEventListener('click', function(e) {
                e.preventDefault();
                saveVehicle();
            });

            clearFormBtn.addEventListener('click', function() {
                clearForm();
                editingVehicleId = null;
                saveBtn.textContent = 'GUARDAR';
            });

            window.editVehicle = function(vehicleId) {
                const vehicle = vehicles.find(v => v.id === vehicleId);
                if (!vehicle) return;
                brandInput.value = vehicle.brand;
                modelInput.value = vehicle.model;
                plateInput.value = vehicle.plateNumber;
                yearInput.value = vehicle.year;
                mileageInput.value = vehicle.mileage;
                colorInput.value = vehicle.color || '';
                notesInput.value = vehicle.notes || '';
                editingVehicleId = vehicleId;
                saveBtn.textContent = 'ACTUALIZAR';
                document.querySelector('.form-container').scrollIntoView({ behavior: 'smooth' });
            };

            window.deleteVehicle = function(vehicleId) {
                if (confirm('¿Eliminar este vehículo?')) {
                    vehicles = vehicles.filter(v => v.id !== vehicleId);
                    saveToStorage();
                    renderVehicleList();
                    if (editingVehicleId === vehicleId) {
                        clearForm();
                        editingVehicleId = null;
                        saveBtn.textContent = 'GUARDAR';
                    }
                }
            };

            loadVehicles();
        });
    </script>
</body>
</html>
