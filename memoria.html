<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kiroo - Memoria de Partes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/memoria.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-kiroo sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index_cliente.html"><i class="bi bi-car-front-fill"></i> Kiroo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index_cliente.html"><i class="bi bi-house-door"></i> Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="agenda_cliente.html"><i class="bi bi-calendar-check"></i> Agenda</a></li>
                    <li class="nav-item"><a class="nav-link active" href="gamificacion.html"><i class="bi bi-joystick"></i> Gamificación</a></li>
                    <li class="nav-item"><a class="nav-link" href="vehiculos_cliente.html"><i class="bi bi-car-front"></i> Mis Vehículos</a></li>
                    <li class="nav-item"><a class="nav-link" href="emergencias_cliente.html"><i class="bi bi-phone"></i> Emergencias</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="d-flex align-items-center gap-3 mb-4 flex-wrap">
            <a href="gamificacion.html" class="btn btn-outline-red"><i class="bi bi-arrow-left"></i> Volver a juegos</a>
            <h2 class="mb-0 fw-semibold"><i class="bi bi-collection-fill text-danger"></i> Memoria de Partes</h2>
        </div>

        <div class="content-card">
            <div class="card-header-custom">
                <span><i class="bi bi-collection-fill"></i> Encuentra las parejas</span>
                <button class="btn btn-sm btn-outline-secondary-custom" onclick="resetMemory()"><i class="bi bi-arrow-repeat"></i> Reiniciar</button>
            </div>
            <div class="p-4">
                <div class="d-flex justify-content-between mb-3">
                    <span><i class="bi bi-pencil"></i> Intentos: <span id="memoryAttempts" class="fw-bold">0</span></span>
                    <span><i class="bi bi-check-circle"></i> Parejas: <span id="memoryMatches" class="fw-bold">0</span>/8</span>
                </div>
                <div class="memory-board" id="memoryBoard"></div>
                <div id="memoryResults" style="display: none;" class="text-center py-4">
                    <i class="bi bi-emoji-laughing-fill text-success" style="font-size: 3rem;"></i>
                    <h4 class="mt-3">¡Felicidades!</h4>
                    <p>Completaste el memorama en <span id="finalAttempts" class="fw-bold text-danger">0</span> intentos</p>
                    <button class="btn btn-outline-red" onclick="resetMemory()">Jugar de nuevo</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-white py-4">
        <div class="container text-center text-muted small">&copy; 2025 Kiroo — Aprende jugando sobre tu vehículo</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/memoria.css"></script>
</body>
</html>
